<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rep Skill Scorecard · Meevo Sales Enablement</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1419;--bg-2:#161c24;--card:#1b232d;--card-2:#212b37;--border:#2b3742;
  --ink:#f2f5f8;--ink-2:#aeb9c5;--muted:#6f7c8a;
  --teal:#2f8f9d;--teal-lt:#54b3c1;--plum:#7d5a8c;
  --green:#3fae6f;--amber:#d99a2b;--red:#d1556a;
  --shadow:0 8px 30px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:28px 32px 80px}
.mast{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.mast .logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--teal),var(--plum));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff;flex-shrink:0}
.mast h1{font-size:23px;font-weight:800;letter-spacing:-0.02em}
.mast .sub{font-size:13px;color:var(--muted);margin-top:1px}
.controls{display:flex;gap:12px;align-items:center;margin:22px 0 8px;flex-wrap:wrap}
.search{flex:1;min-width:240px;position:relative}
.search input{width:100%;padding:13px 16px 13px 44px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px;color:var(--ink);font-size:15px;font-family:inherit}
.search input:focus{outline:none;border-color:var(--teal)}
.search .ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.btn{padding:13px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s,border-color .15s}
.btn:hover{background:var(--card-2)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.primary:hover{background:var(--teal-lt)}
.btn:disabled{opacity:.6;cursor:default}
.sync-note{font-size:12px;color:var(--muted);margin:2px 0 26px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:6px 0 14px}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.rep-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;display:flex;align-items:center;gap:14px}
.rep-card:hover{transform:translateY(-2px);border-color:var(--teal);box-shadow:var(--shadow)}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.rep-card .info{flex:1;min-width:0}
.rep-card .nm{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-card .role{font-size:11px;font-weight:600;color:var(--muted)}
.rep-card .total{text-align:right;flex-shrink:0}
.rep-card .total .n{font-size:22px;font-weight:800;line-height:1}
.rep-card .total .d{font-size:10px;color:var(--muted);font-weight:600}
.role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.role-ae{background:rgba(47,143,157,0.18);color:var(--teal-lt)}
.role-sdr{background:rgba(125,90,140,0.22);color:#c3a5d0}
.detail{display:none}
.back{background:none;border:none;color:var(--ink-2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:6px 0;margin-bottom:16px}
.back:hover{color:var(--ink)}
.rep-head{display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:22px;flex-wrap:wrap}
.rep-head .avatar{width:64px;height:64px;font-size:22px}
.rep-head .hinfo{flex:1;min-width:180px}
.rep-head .hinfo h2{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.rep-head .hinfo .meta{font-size:13px;color:var(--muted);margin-top:3px}
.score-ring{text-align:center;flex-shrink:0}
.score-ring .big{font-size:44px;font-weight:800;line-height:1}
.score-ring .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:2px}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:17px 18px;cursor:pointer;transition:border-color .12s,background .12s}
.skill-card:hover{border-color:var(--teal);background:var(--card-2)}
.skill-card.nodata{opacity:.62}
.skill-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.skill-card .stage{font-size:14px;font-weight:700}
.skill-card .stage .sub{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
.skill-card .sc{font-size:20px;font-weight:800;flex-shrink:0}
.skill-card .sc .max{font-size:12px;color:var(--muted);font-weight:600}
.segbar{display:flex;gap:4px}
.seg{flex:1;height:7px;border-radius:3px;background:var(--border)}
.skill-card .hint{font-size:11px;color:var(--muted);margin-top:11px;display:flex;align-items:center;gap:5px}
.overlay{display:none;position:fixed;inset:0;background:rgba(8,11,15,0.72);backdrop-filter:blur(3px);z-index:50;align-items:center;justify-content:center;padding:24px}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{padding:22px 24px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;position:sticky;top:0;background:var(--card)}
.modal-head .st{font-size:18px;font-weight:800}
.modal-head .st .sub{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:3px}
.modal-head .mscore{text-align:right;flex-shrink:0}
.modal-head .mscore .n{font-size:30px;font-weight:800;line-height:1}
.modal-head .mscore .d{font-size:11px;color:var(--muted);font-weight:600}
.close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:0 0 0 6px}
.close:hover{color:var(--ink)}
.modal-body{padding:22px 24px 26px}
.mb-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:9px}
.why{font-size:14px;color:var(--ink-2);line-height:1.65;margin-bottom:24px}
.notes{list-style:none;display:flex;flex-direction:column;gap:11px}
.notes li{display:flex;gap:12px;background:var(--bg-2);border:1px solid var(--border);border-radius:11px;padding:13px 15px;font-size:13.5px;line-height:1.55;color:var(--ink)}
.notes li .num{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px}
@media(max-width:560px){.wrap{padding:20px 16px 60px}.rep-head{gap:14px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast">
    <div class="logo">M</div>
    <div>
      <h1>Rep Skill Scorecard</h1>
      <div class="sub">H1 Review · January 1 – present · skill level across the sales process, from all Attention calls</div>
    </div>
  </div>
  <div class="controls">
    <div class="search"><span class="ico">&#128269;</span>
      <input id="searchBox" type="text" placeholder="Search a rep by name…  (try Matt)" autocomplete="off"></div>
    <button class="btn primary" id="refreshBtn">&#8635;&nbsp; Refresh</button>
  </div>
  <div class="sync-note" id="syncNote">Loading live data…</div>

  <div id="home">
    <div class="section-label" id="homeLabel">All reps</div>
    <div class="rep-grid" id="repGrid"></div>
  </div>

  <div id="detail" class="detail">
    <button class="back" id="backBtn">&#8592; Back to all reps</button>
    <div class="rep-head">
      <div class="avatar" id="dAvatar"></div>
      <div class="hinfo"><h2 id="dName"></h2><div class="meta" id="dMeta"></div></div>
      <div class="score-ring"><div class="big" id="dTotal"></div><div class="lbl">Overall / 10</div></div>
    </div>
    <div class="section-label">Skill by stage · tap any stage for the why and coaching notes</div>
    <div class="skill-grid" id="skillGrid"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="st" id="mStage"></div>
      <div style="display:flex;align-items:flex-start;gap:8px">
        <div class="mscore"><div class="n" id="mScore"></div><div class="d">/ 5</div></div>
        <button class="close" id="closeBtn">&times;</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="mb-label">Why this score</div>
      <div class="why" id="mWhy"></div>
      <div class="mb-label">Top coaching notes</div>
      <ul class="notes" id="mNotes"></ul>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — reads the RepSkills tab of the Meevo Hub sheet (gviz, read-only)
// ============================================================
var SHEET_ID = '1avGHu-hPMwM1XMsVIJaSP1ZUIlNwWLoyRCRYdRvgxWU';
var TAB      = 'RepSkills';

// Stage display order + subtitles per role (labels also come from the sheet).
var AE_STAGES = [
  { key:'opening',        sub:'Purpose, plan & outcome set up front' },
  { key:'discovery',      sub:'Uncovering situation, priorities & pain' },
  { key:'businessImpact', sub:'Connecting impact to the value proposition' },
  { key:'fab',            sub:'FAB tied to a quantifiable outcome' },
  { key:'objection',      sub:'Acknowledge, reframe, re-engage' },
  { key:'execSummary',    sub:'Recap, confirm agreement, transition' },
  { key:'pricing',        sub:'Anchor on value, defend, trade the discount' },
  { key:'closing',        sub:'Minor (next call) & major (the deal)' },
];
var SDR_STAGES = [
  { key:'opening',   sub:'Confident, relevant, earns the time' },
  { key:'discovery', sub:'Targeted questions that surface pain' },
  { key:'objection', sub:'Acknowledge, reframe, keep it moving' },
  { key:'closing',   sub:'Minor (meeting) & major (opportunity)' },
];
function stageOrder(role){ return role === 'AE' ? AE_STAGES : SDR_STAGES; }

var REPS = [];  // populated from the sheet

// ── helpers ──
function initials(name){ return name.split(' ').map(function(p){return p[0]}).join('').slice(0,2).toUpperCase(); }
function avatarColor(name){ var c=['#2f8f9d','#7d5a8c','#3fae6f','#c07a3e','#4a72a8','#a8546a'];var s=0;for(var i=0;i<name.length;i++)s+=name.charCodeAt(i);return c[s%c.length]; }
function scoreColor(v){ return v==null?'var(--muted)':(v<2.5?'var(--red)':(v<=3.5?'var(--amber)':'var(--green)')); }
function totalColor(v){ return v<5?'var(--red)':(v<7?'var(--amber)':'var(--green)'); }
function fmt1(v){ return (Math.round(v*10)/10).toFixed(1); }
function total10(rep){
  var st=stageOrder(rep.role),sum=0,n=0;
  st.forEach(function(s){ var d=rep.stages[s.key]; if(d&&d.score!=null){sum+=d.score;n++;} });
  return n?Math.round((sum/n*2)*10)/10:0;
}

// ── data load (gviz) ──
function gvizUrl(){ return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(TAB)+'&_='+Date.now(); }
function loadData(){
  var note=document.getElementById('syncNote');
  note.textContent='Loading live data…';
  return fetch(gvizUrl()).then(function(r){return r.text();}).then(function(txt){
    var json=JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
    var rows=(json.table && json.table.rows) || [];
    var byEmail={};
    rows.forEach(function(row){
      var c=row.c||[];
      function val(i){ return c[i]&&c[i].v!=null?c[i].v:''; }
      var email=String(val(0)); if(!email) return;
      var name=String(val(1)), role=String(val(2)), key=String(val(3)), label=String(val(4));
      var scoreRaw=val(5); var score=(scoreRaw===''||scoreRaw==null)?null:parseFloat(scoreRaw);
      var calls=parseInt(val(6))||0; var why=String(val(7));
      var notes=[]; try{ notes=JSON.parse(val(8))||[]; }catch(e){}
      if(!byEmail[email]) byEmail[email]={name:name,role:role,stages:{}};
      byEmail[email].stages[key]={score:score,calls:calls,label:label,why:why,notes:notes};
    });
    REPS=Object.keys(byEmail).map(function(e){return byEmail[e];})
         .sort(function(a,b){return a.name.localeCompare(b.name);});
    if(!REPS.length){ note.textContent='Connected, but the RepSkills tab is empty. Run computeRepSkills() in Apps Script.'; }
    else { note.textContent='Live · '+REPS.length+' reps · updated '+new Date().toLocaleString(); }
    renderHome(document.getElementById('searchBox').value);
  }).catch(function(err){
    note.textContent='Could not load the RepSkills tab. Check the sheet is shared/published. ('+(err.message||'error')+')';
    document.getElementById('repGrid').innerHTML='<div class="empty">No data loaded.</div>';
  });
}

// ── render home ──
function renderHome(filter){
  var q=(filter||'').toLowerCase().trim();
  var grid=document.getElementById('repGrid');
  var list=REPS.filter(function(r){return !q||r.name.toLowerCase().indexOf(q)>=0;});
  document.getElementById('homeLabel').textContent = q ? (list.length+' match'+(list.length===1?'':'es')) : 'All reps · '+REPS.length;
  if(!list.length){ grid.innerHTML='<div class="empty">No rep matches “'+q+'”.</div>'; return; }
  grid.innerHTML=list.map(function(r){
    var t=total10(r);
    return '<div class="rep-card" onclick="openRep(\''+r.name.replace(/'/g,"\\'")+'\')">'
      +'<div class="avatar" style="background:'+avatarColor(r.name)+'">'+initials(r.name)+'</div>'
      +'<div class="info"><div class="nm">'+r.name+'</div>'
      +'<span class="role-badge '+(r.role==='AE'?'role-ae':'role-sdr')+'">'+r.role+'</span></div>'
      +'<div class="total"><div class="n" style="color:'+totalColor(t)+'">'+fmt1(t)+'</div><div class="d">/ 10</div></div>'
      +'</div>';
  }).join('');
}

// ── render detail ──
var currentRep=null;
function openRep(name){
  var rep=REPS.filter(function(r){return r.name===name;})[0]; if(!rep) return;
  currentRep=rep;
  document.getElementById('home').style.display='none';
  document.getElementById('detail').style.display='block';
  var t=total10(rep);
  document.getElementById('dAvatar').textContent=initials(rep.name);
  document.getElementById('dAvatar').style.background=avatarColor(rep.name);
  document.getElementById('dName').textContent=rep.name;
  document.getElementById('dMeta').innerHTML='<span class="role-badge '+(rep.role==='AE'?'role-ae':'role-sdr')+'">'+rep.role+'</span> &nbsp; '+stageOrder(rep.role).length+' skill stages · H1 to date';
  document.getElementById('dTotal').textContent=fmt1(t);
  document.getElementById('dTotal').style.color=totalColor(t);
  var grid=document.getElementById('skillGrid');
  grid.innerHTML=stageOrder(rep.role).map(function(s){
    var d=rep.stages[s.key]||{score:null,label:s.key,notes:[]};
    var v=d.score; var col=scoreColor(v);
    var label=d.label||s.key;
    var segs=''; for(var i=1;i<=5;i++){ segs+='<div class="seg" style="background:'+((v!=null&&i<=Math.round(v))?col:'var(--border)')+'"></div>'; }
    var scoreTxt=(v==null)?'—':fmt1(v);
    return '<div class="skill-card '+(v==null?'nodata':'')+'" onclick="openSkill(\''+s.key+'\')">'
      +'<div class="top"><div class="stage">'+label+'<span class="sub">'+s.sub+'</span></div>'
      +'<div class="sc" style="color:'+col+'">'+scoreTxt+'<span class="max">/5</span></div></div>'
      +'<div class="segbar">'+segs+'</div>'
      +'<div class="hint">&#128172; '+(v==null?'No scored calls yet':'Tap for the why & coaching notes')+'</div>'
      +'</div>';
  }).join('');
  window.scrollTo(0,0);
}
function backHome(){ document.getElementById('detail').style.display='none'; document.getElementById('home').style.display='block'; window.scrollTo(0,0); }

// ── skill modal ──
function openSkill(key){
  if(!currentRep) return;
  var s=stageOrder(currentRep.role).filter(function(x){return x.key===key;})[0];
  var d=currentRep.stages[key]||{score:null,label:key,why:'No data for this stage yet.',notes:[]};
  var v=d.score;
  document.getElementById('mStage').innerHTML=(d.label||key)+'<span class="sub">'+s.sub+'</span>';
  document.getElementById('mScore').textContent=(v==null)?'—':fmt1(v);
  document.getElementById('mScore').style.color=scoreColor(v);
  document.getElementById('mWhy').textContent=d.why||'No summary available.';
  var notes=(d.notes&&d.notes.length)?d.notes:['No specific coaching notes captured for this stage yet.'];
  document.getElementById('mNotes').innerHTML=notes.map(function(n,i){
    return '<li><span class="num">'+(i+1)+'</span><span>'+String(n)+'</span></li>';
  }).join('');
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

// ── wiring ──
document.getElementById('searchBox').addEventListener('input', function(e){
  if(document.getElementById('detail').style.display==='block') backHome();
  renderHome(e.target.value);
});
document.getElementById('searchBox').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ var q=e.target.value.toLowerCase().trim();
    var m=REPS.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0;}); if(m.length) openRep(m[0].name); }
});
document.getElementById('refreshBtn').addEventListener('click', function(){
  var b=this; b.disabled=true; loadData().then(function(){ b.disabled=false; }); backHome();
});
document.getElementById('backBtn').addEventListener('click', backHome);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

loadData();
</script>
</body>
</html>
